<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Invoice</title>
    <style>
        body { font-family: Arial, sans-serif; }
        h1 { text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #f5f5f5; }
        .total { font-weight: bold; }
    </style>
</head>
<body>
    <h1>Invoice</h1>
    <p>Date: {{ date }}</p>
    <p>Name: {{ name }}</p>
    <p>Company: {{ company_name }}</p>

    <table>
        <tr>
            <th>Description</th>
            <th>Days</th>
            <th>Rate</th>
            <th>Amount</th>
        </tr>
        <tr>
            <td>{{ description1 }}</td>
            <td>{{ days }}</td>
            <td>{{ rate }}</td>
            <td>{{ amount }}</td>
        </tr>
        <tr>
            <td>Extra</td>
            <td>{{ extra_days }}</td>
            <td>{{ extra_rate }}</td>
            <td>{{ extra_amount }}</td>
        </tr>
        <tr>
            <td>Toll</td>
            <td>{{ toll_days }}</td>
            <td>{{ toll_rate }}</td>
            <td>{{ toll_amount }}</td>
        </tr>
        <tr class="total">
            <td colspan="3">Total</td>
            <td>{{ total }}</td>
        </tr>
    </table>
</body>
</html>
